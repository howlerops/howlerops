name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'pkg/**'
      - 'internal/**'
      - 'cmd/**'
      - 'services/**'
      - '*.go'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'pkg/**'
      - 'internal/**'
      - 'cmd/**'
      - 'services/**'
      - '*.go'
      - '.github/workflows/backend-tests.yml'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc musl-dev sqlite3 libsqlite3-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config

      - name: Create frontend dist stub for embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -tags duckdb $(go list -tags duckdb ./... | grep -v /test/integration) -v -coverprofile=coverage.out -race -timeout=5m

      - name: Generate coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: backend-unit-tests

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: true
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc musl-dev sqlite3 libsqlite3-dev jq bc \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config

      - name: Create frontend dist stub for embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Install dependencies
        run: go mod download

      - name: Build server
        run: go build -tags duckdb -o server cmd/server/main.go

      - name: Start server in background
        env:
          TURSO_URL: "file:./test.db"
          JWT_SECRET: "test-secret-key-for-ci-testing-only-minimum-32-characters-required"
          ENVIRONMENT: "test"
          LOG_LEVEL: "debug"
          OLLAMA_ENDPOINT: "http://localhost:11434"
        run: |
          ./server &
          echo $! > server.pid
          # Wait for server to start
          sleep 10

      - name: Check server health
        continue-on-error: true  # Server may not start without full infrastructure in CI
        run: |
          curl -f http://localhost:8500/health || (cat logs/app.log 2>/dev/null; echo "Server health check failed - expected in CI without full infra")

      - name: Run smoke tests
        continue-on-error: true  # Smoke tests require running server
        run: |
          if [ -f ./scripts/smoke-tests.sh ]; then
            ./scripts/smoke-tests.sh
          else
            echo "Smoke test script not found - skipping"
          fi

      - name: Run integration tests
        run: go test -tags duckdb ./test/integration/... -v -timeout=5m
        continue-on-error: true  # Skip integration tests for now - require running server

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-logs
          path: logs/

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc musl-dev sqlite3 libsqlite3-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config

      - name: Create frontend dist stub for embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          args: --timeout=5m --build-tags=duckdb
          skip-cache: true  # Temporarily skip cache to force re-lint with updated config

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc musl-dev sqlite3 libsqlite3-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config

      - name: Create frontend dist stub for embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out results.sarif -exclude-dir=vendor -exclude-dir=test -exclude-dir=build/ios -exclude-dir=pkg/pb -exclude=G101,G104,G115,G117,G201,G202,G304,G701,G703,G704,G705 -severity medium -tags duckdb ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true  # SARIF format issues - non-critical

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, lint]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Lint: ${{ needs.lint.result }}"

          # Integration tests are non-blocking (require server infrastructure not in CI)
          if [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "⚠️  Integration tests did not pass (expected - requires full server infrastructure)"
          fi

          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Required checks failed"
            exit 1
          fi

          echo "All required checks passed!"
