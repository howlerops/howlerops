name: Go Unit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-unit:
    name: Go Unit Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install system dependencies
        run: |
          # Install GTK and WebKit dependencies required by Wails v3
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            gcc \
            pkg-config

      - name: Go unit tests (services)
        run: go test -tags duckdb ./services

      - name: Go unit tests (internal packages)
        run: go test -tags duckdb ./internal/config ./internal/services ./internal/middleware ./internal/server ./internal/rag ./internal/ai ./cmd/migrate-vector-db
