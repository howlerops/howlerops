name: Go Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC

jobs:
  go-integration:
    name: Go Integration Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap Go CI
        uses: ./.github/actions/setup-go-ci
        with:
          go-version: '1.26.0'
          cache: 'true'
          cache-dependency-path: go.sum
          extra-packages: 'jq bc'

      - name: Run backend integration tests (-tags=integration,duckdb)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(GO_TAGS='integration,duckdb' ./scripts/ci/list-backend-go-packages.sh)
          go test -tags=integration,duckdb "${packages[@]}" -v -timeout=10m
