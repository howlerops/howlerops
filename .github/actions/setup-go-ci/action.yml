name: Setup Go CI
description: Standardize Go setup, Linux system packages, frontend embed stub, and module download for CI jobs.

inputs:
  go-version:
    description: Go version to install
    required: false
    default: "1.26.0"
  cache:
    description: Enable Go cache in setup-go
    required: false
    default: "true"
  cache-dependency-path:
    description: Dependency path for setup-go cache
    required: false
    default: "go.sum"
  extra-packages:
    description: Optional additional apt packages
    required: false
    default: ""
  create-frontend-dist-stub:
    description: Create frontend/dist/index.html for go:embed consumers
    required: false
    default: "true"
  download-modules:
    description: Download Go modules
    required: false
    default: "true"
  verify-modules:
    description: Run go mod verify after download
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}
        cache: ${{ inputs.cache }}
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install system dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          gcc musl-dev sqlite3 libsqlite3-dev \
          libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config \
          ${{ inputs.extra-packages }}

    - name: Create frontend dist stub for embed
      if: ${{ inputs.create-frontend-dist-stub == 'true' }}
      shell: bash
      run: mkdir -p frontend/dist && touch frontend/dist/index.html

    - name: Download Go modules
      if: ${{ inputs.download-modules == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        go mod download
        if [[ "${{ inputs.verify-modules }}" == "true" ]]; then
          go mod verify
        fi
