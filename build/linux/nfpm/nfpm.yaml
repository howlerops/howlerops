# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "howlerops"
arch: ${GOARCH}
platform: "linux"
version: "0.3.2"
section: "default"
priority: "extra"
maintainer: HowlerOps Team <team@howlerops.com>
description: "A powerful desktop SQL client"
vendor: "HowlerOps"
homepage: "https://howlerops.com"
license: "MIT"
release: "1"

contents:
  - src: "./bin/howlerops"
    dst: "/usr/local/bin/howlerops"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/howlerops.png"
  - src: "./build/linux/howlerops.desktop"
    dst: "/usr/share/applications/howlerops.desktop"

# Default dependencies for Debian 12/Ubuntu 22.04+ with WebKit 4.1
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0

# Distribution-specific overrides for different package formats and WebKit versions
overrides:
  # RPM packages for RHEL/CentOS/AlmaLinux/Rocky Linux (WebKit 4.0)
  rpm:
    depends:
      - gtk3
      - webkit2gtk4.1

  # Arch Linux packages (WebKit 4.1)
  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1

# scripts section to ensure desktop database is updated after install
scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
  # You can also add preremove, postremove if needed
  # preremove: "./build/linux/nfpm/scripts/preremove.sh"
  # postremove: "./build/linux/nfpm/scripts/postremove.sh"
